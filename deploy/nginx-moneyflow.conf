# Скопіюйте в /etc/nginx/sites-available/moneyflow.vladdev.pp.ua
# і зробіть symlink у sites-enabled.
# Потім: sudo nginx -t && sudo systemctl reload nginx
#
# Certbot (Let's Encrypt):
#   sudo certbot --nginx -d moneyflow.vladdev.pp.ua
#
# Якщо Cloudflare — SSL mode "Full (strict)" після отримання сертифіката на origin.

server {
    listen 80;
    listen [::]:80;
    server_name moneyflow.vladdev.pp.ua;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
